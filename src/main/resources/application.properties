spring.application.name=span
spring.jackson.serialization.indent-output=true

# ── Database (Render PostgreSQL) ──
# On Render: set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# from the "Connection" tab of your Render Postgres instance
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/span}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:span}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:span}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ──
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Massive (Polygon.io) — used for screener ──
massive.api.base-url=https://api.massive.com
massive.api.key=${MASSIVE_API_KEY:19q22T9VPm9owN8hUtXmblCazcdWRBih}

# ── FMP — used for backtest ──
fmp.api.base-url=https://financialmodelingprep.com
fmp.api.key=${FMP_API_KEY:WE9Mhi3nRwQllc8T7G8jj81ntwEJa2ck}

# ── Backtest configuration ──
# Supported values: composite (default), fmp, massive
backtest.provider=composite

# ── Cache warmup ──
# Popular tickers to pre-warm on startup and every 6 hours (keep small to not exhaust API quota)
warmup.tickers=${WARMUP_TICKERS:AAPL,MSFT,NVDA}

# ── Dashboard scanner ──
# ~100 popular stocks across sectors: mega-cap tech, FAANG+, semiconductors,
# financials, healthcare, consumer, industrials, energy, REITs, recent IPOs, meme stocks
dashboard.tickers=${DASHBOARD_TICKERS:\
AAPL,MSFT,GOOGL,AMZN,META,NVDA,TSLA,\
NFLX,CRM,ADBE,ORCL,INTC,AMD,AVGO,QCOM,MU,MRVL,\
UBER,ABNB,SQ,SHOP,SNOW,PLTR,COIN,HOOD,SOFI,\
JPM,GS,MS,BAC,WFC,V,MA,AXP,PYPL,\
JNJ,UNH,PFE,ABBV,LLY,MRK,BMY,AMGN,\
DIS,SBUX,NKE,MCD,KO,PEP,PG,COST,WMT,TGT,HD,LOW,\
BA,CAT,GE,HON,UPS,FDX,\
XOM,CVX,COP,SLB,\
AMT,PLD,SPG,O,\
RIVN,LCID,ARM,SMCI,CRWD,PANW,ZS,NET,DDOG,\
GME,AMC,BBBY,RBLX,ROKU,SNAP,PINS,\
T,VZ,TMUS,\
BRK.B,BX,KKR,SCHW,\
LMT,RTX,NOC,GD,\
